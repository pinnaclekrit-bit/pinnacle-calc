<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Point Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header-box { background: #00b900; color: white; padding: 20px; }
        .result-box { 
            background: white; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 10px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .result-box.active { border-color: #00b900; background: #fafffa; }
        .points { font-size: 1.4rem; font-weight: bold; color: #00b900; }
        .btn-line { background: #00b900; color: white; font-weight: bold; border-radius: 10px; padding: 15px; border: none; width: 100%; }
        .btn-line:active { background: #009900; transform: scale(0.98); }
    </style>
</head>
<body class="p-3">

    <div class="container" style="max-width: 450px;">
        <div class="card">
            <div class="header-box text-center">
                <h3 class="m-0">Pinnacle Point Calc</h3>
            </div>
            
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">1. กรอกยอดเงิน (บาท)</label>
                    <input type="number" id="amount" class="form-control form-control-lg text-center" placeholder="0.00" oninput="calculateAll()">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">2. ประเภทการจอง</label>
                    <select id="bookingType" class="form-select form-select-lg" onchange="calculateAll()">
                        <option value="1">จองตรง (100%)</option>
                        <option value="0.5">OTA / Agoda (50%)</option>
                    </select>
                </div>

                <label class="form-label fw-bold">3. เลือกผลลัพธ์ที่ต้องการก๊อปปี้:</label>
                
                <div class="result-box d-flex justify-content-between align-items-center" onclick="selectTier('S')">
                    <div>Silver <small class="text-muted">(200=1)</small></div>
                    <span id="resS" class="points">0</span>
                </div>

                <div class="result-box d-flex justify-content-between align-items-center active" id="boxG" onclick="selectTier('G')">
                    <div class="fw-bold">Gold <small class="text-muted">(180=1)</small></div>
                    <span id="resG" class="points">0</span>
                </div>

                <div class="result-box d-flex justify-content-between align-items-center" onclick="selectTier('P')">
                    <div>Pinnacle <small class="text-muted">(150=1)</small></div>
                    <span id="resP" class="points">0</span>
                </div>

                <button onclick="processFinal()" class="btn-line mt-3">
                    คัดลอกคะแนน & เปิดหน้าออกพอยท์
                </button>
            </div>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        let selectedPoints = 0;

        // เปลี่ยน YOUR_LIFF_ID เป็น ID ของคุณ
        liff.init({ liffId: "2009927519-aAoLoyCz" });

        function calculateAll() {
            const amt = document.getElementById('amount').value || 0;
            const factor = document.getElementById('bookingType').value;

            const s = Math.floor((amt / 200) * factor);
            const g = Math.floor((amt / 180) * factor);
            const p = Math.floor((amt / 150) * factor);

            document.getElementById('resS').innerText = s;
            document.getElementById('resG').innerText = g;
            document.getElementById('resP').innerText = p;
            
            // Default ให้เลือก Gold ไว้ก่อน
            selectedPoints = g;
        }

        function selectTier(tier) {
            // ลบสีเขียวเข้มออกจากทุกกล่อง
            document.querySelectorAll('.result-box').forEach(b => b.classList.remove('active', 'border-primary'));
            
            // เพิ่มสีให้กล่องที่ถูกเลือก
            const targetId = 'res' + tier;
            selectedPoints = document.getElementById(targetId).innerText;
            event.currentTarget.classList.add('active');
        }

        function processFinal() {
            if (selectedPoints == 0) {
                alert("กรุณากรอกยอดเงินก่อนครับ");
                return;
            }

            navigator.clipboard.writeText(selectedPoints).then(() => {
                alert("คัดลอก " + selectedPoints + " แต้มแล้ว! กำลังไปที่หน้าออกพอยท์...");
                
                // ลิงก์ LIFF ใหม่ที่คุณส่งมา (ซัพพอร์ตมือถือ 100%)
                const staffUrl = "https://liff.line.me/2000733931-wPdEZX0R/channels/5000096716/crm/staff/add-point";
                
                liff.openWindow({
                    url: staffUrl,
                    external: true
                });
            });
        }
    </script>
</body>
</html>
